<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <title>Admin Images Restaurant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hash-cell {
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
    }

    .thumb {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
    }

    .tab-content {
      padding-top: 1.5rem;
    }
  </style>
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/admin/">🍽️ Restaurant Images</a>
    </div>
  </nav>

  <div class="container pb-5">
    <ul class="nav nav-tabs" id="mainTabs">
      <li class="nav-item">
        <button class="nav-link active" data-tab="categories">Catégories</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-tab="images">Images</button>
      </li>
    </ul>

    <div id="alert" class="alert mt-3 d-none"></div>

    <!-- TAB: Catégories -->
    <div class="tab-content" id="tab-categories">
      <div class="row g-4">
        <div class="col-md-5">
          <div class="card">
            <div class="card-header">Nouvelle catégorie</div>
            <div class="card-body">
              <form id="form-category">
                <div class="mb-3">
                  <label class="form-label">Nom</label>
                  <input type="text" name="name" class="form-control" required>
                </div>
                <button class="btn btn-primary">Créer</button>
              </form>
            </div>
          </div>
        </div>
        <div class="col-md-7">
          <div class="card">
            <div class="card-header">Catégories</div>
            <ul class="list-group list-group-flush" id="list-categories"></ul>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: Images -->
    <div class="tab-content d-none" id="tab-images">
      <div class="card mb-4">
        <div class="card-header">Uploader des images</div>
        <div class="card-body">
          <form id="form-upload">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Catégorie</label>
                <select name="category_id" class="form-select" id="select-category" required></select>
              </div>
              <div class="col-md-8">
                <label class="form-label">Images (multiple)</label>
                <input type="file" name="files" class="form-control" multiple accept="image/*" required>
              </div>
            </div>
            <button class="btn btn-success mt-3">Uploader</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>Toutes les images</span>
          <div class="d-flex gap-2">
            <select id="filter-category" class="form-select form-select-sm" style="width:250px">
              <option value="">Toutes catégories</option>
            </select>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Aperçu</th>
                <th>Hash</th>
                <th>Catégorie</th>
                <th>Nom original</th>
                <th>Taille</th>
              </tr>
            </thead>
            <tbody id="list-images"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/v1';

    function showAlert(msg, type = 'success') {
      const el = document.getElementById('alert');
      el.className = `alert alert-${type} mt-3`;
      el.textContent = msg;
      el.classList.remove('d-none');
      setTimeout(() => el.classList.add('d-none'), 3000);
    }

    // Tabs
    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('d-none'));
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('d-none');
      });
    });

    // Categories
    async function loadCategories() {
      const res = await fetch(`${API}/categories`);
      const cats = await res.json();

      // Tri personnalisé
      const order = ['Populaires', 'Nouveautés', 'Menus', 'Entrées', 'Plats',
        'Burgers', 'Pizzas', 'Grillades', 'Accompagnements',
        'Desserts', 'Boissons', 'Promotions'];

      cats.sort((a, b) => {
        const ia = order.findIndex(o => a.name.includes(o));
        const ib = order.findIndex(o => b.name.includes(o));
        return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
      });

      const list = document.getElementById('list-categories');
      list.innerHTML = cats.length ? '' : '<li class="list-group-item text-muted">Aucune catégorie</li>';

      cats.forEach(c => {
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between';
        li.innerHTML = `
            <span><strong>${c.name}</strong> <code class="text-muted">${c.slug}</code></span>
            <span class="badge bg-secondary">${c.images_count} images</span>
        `;
        list.appendChild(li);
      });

      const select = document.getElementById('select-category');
      const filter = document.getElementById('filter-category');
      select.innerHTML = '<option value="">-- Choisir --</option>';
      filter.innerHTML = '<option value="">Toutes catégories</option>';

      cats.forEach(c => {
        select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        filter.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });
    }

    document.getElementById('form-category').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value;
      const res = await fetch(`${API}/categories`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      if (res.ok) {
        showAlert('Catégorie créée');
        e.target.reset();
        loadCategories();
      } else {
        showAlert('Erreur', 'danger');
      }
    });

    // Images
    async function loadImages(categoryId = '') {
      let url = `${API}/images`;
      if (categoryId) url += `?category_id=${categoryId}`;

      const res = await fetch(url);
      const data = await res.json();

      const tbody = document.getElementById('list-images');
      tbody.innerHTML = data.data.length ? '' : '<tr><td colspan="5" class="text-center text-muted py-4">Aucune image</td></tr>';

      data.data.forEach(img => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><img src="${img.url}" class="thumb"></td>
            <td class="hash-cell">${img.hash}</td>
            <td>${img.category.name}</td>
            <td>${img.original_name}</td>
            <td>${(img.size / 1024).toFixed(1)} Ko</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('form-upload').addEventListener('submit', async (e) => {
      e.preventDefault();
      const files = e.target.files.files;
      const categoryId = e.target.category_id.value;

      if (!categoryId) {
        showAlert('Choisis une catégorie', 'warning');
        return;
      }

      let uploaded = 0;
      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('category_id', categoryId);

        const res = await fetch(`${API}/images`, {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          const data = await res.json();
          if (data.message === 'Image already exists (same content)') {
            console.log('Doublon ignoré:', file.name);
          } else {
            uploaded++;
          }
        }
      }

      showAlert(`${uploaded} image(s) uploadée(s)`);
      e.target.reset();
      loadImages();
    });

    document.getElementById('filter-category').addEventListener('change', (e) => {
      loadImages(e.target.value);
    });

    // Init
    loadCategories();
    loadImages();
  </script>
</body>

</html>
